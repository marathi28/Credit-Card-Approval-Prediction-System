<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Credit Ledger — Approval Intelligence{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="grain"></div>
<header class="topbar">
  <a href="{{ url_for('home') }}" class="brand">
    <span class="brand-mark">§</span>
    <span class="brand-text">Credit<em>Ledger</em></span>
  </a>
  <nav class="topnav">
    <a href="{{ url_for('home') }}" class="{{ 'active' if active=='home' else '' }}">Overview</a>
    <a href="{{ url_for('predict_page') }}" class="{{ 'active' if active=='predict' else '' }}">Assess Application</a>
    <a href="{{ url_for('models_page') }}" class="{{ 'active' if active=='models' else '' }}">Model Ledger</a>
  </nav>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<footer class="sitefoot">
  <div class="sitefoot-inner">
    <span>Credit Card Approval Prediction System</span>
    <span class="dot">•</span>
    <span>Python · Flask · Scikit-learn · XGBoost</span>
    <span class="dot">•</span>
    <span>Ledger No. 2026-CC</span>
  </div>
</footer>
</body>
</html>
